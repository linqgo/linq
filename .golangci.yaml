version: "2"

run:
  go: "1.23"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofumpt
    - goimports

  settings:
    gofumpt:
      module-path: github.com/linqgo/linq
      extra-rules: true

    goimports:
      local-prefixes: github.com/linqgo/linq
