run:
  go: "1.23"

linters:
  disable-all: true
  enable:
    # default linters
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused

    # extra linters
    - gofumpt
    - goimports

linters-settings:
  gofumpt:
    module-path: github.com/linqgo/linq
    extra-rules: true

  goimports:
    local-prefixes: github.com/linqgo/linq
