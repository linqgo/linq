version: "2"

run:
  go: "1.23"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - gofumpt
    - goimports

linters-settings:
  gofumpt:
    module-path: github.com/linqgo/linq
    extra-rules: true

  goimports:
    local-prefixes: github.com/linqgo/linq
