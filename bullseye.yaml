  T1.1:
    name: Free functions accept and return `iter.Seq[T]`
    status: identified
    value: 1.0
    cost: 1.0
    acceptance:
    - TODO
    context: 'This is the foundational API change for v2. All free functions (`Where`, `Select`, `Take`, `Skip`, `Join`, etc.) accept `iter.Seq[T]` and return `iter.Seq[T]`. They contain only the core transformation logic — no metadata propagation.  `Query[T]` methods continue to accept and return `Query[T]`, preserving FastCount, FastGet, and OneShot metadata. Methods delegate to the corresponding free function and re-attach metadata via `Pipe` + `QueryOption`.  **Design:**  ``` ┌─────────────────────────────────────────────────────────┐ │  Free functions (universal layer)                       │ │                                                         │ │  iter.Seq[T] → iter.Seq[T]                              │ │  No metadata. Works with any Go iterator.               │ │                                                         │ │  Where(seq, pred)                                       │ │  Select(seq, fn)                                        │ │  Take(seq, n)                                           │ │  Join(seqA, seqB, keyA, keyB, result)                   │ │  ...                                                    │ ├─────────────────────────────────────────────────────────┤ │  Query methods (optimised layer)                        │ │                                                         │ │  Query[T] → Query[T]                                    │ │  Propagates FastCount, FastGet, OneShot.                 │ │  Delegates to free functions + re-attaches metadata.    │ │                                                         │ │  q.Where(pred)         // FastCountIfEmpty propagated   │ │  q.Select(fn)          // FastCount + FastGet propagated │ │  q.Take(n)             // FastCount computed             │ │  ...                                                    │ └─────────────────────────────────────────────────────────┘ ```  **Example — before and after:**  ```go // BEFORE: must enter the linq universe q := linq.FromSlice(mySlice) result := linq.Where(q, pred) for x := range result.Seq() { ... }  // AFTER: free functions work with any iterator result := linq.Where(slices.Values(mySlice), pred) for x := range result { ... }  // AFTER: Query path still available for optimisations q := linq.FromSlice(mySlice)       // Query with FastCount = len filtered := q.Where(pred)          // Query with FastCountIfEmpty count, ok := filtered.FastCount()  // O(1) ```  **Migration pattern for each operator:**  1. Current free function body becomes the new free function, but with `iter.Seq[T]` signature (strip metadata logic) 2. Current Query method delegates to the free function and wraps result with `Pipe` + options  ```go // Free function — universal, no metadata func Where[T any](seq iter.Seq[T], pred func(T) bool) iter.Seq[T] { return func(yield func(T) bool) { seq(func(t T) bool { return !pred(t) || yield(t) }) } }  // Query method — optimised, preserves metadata func (q Query[T]) Where(pred func(T) bool) Query[T] { return Pipe(q, Where(q.Seq(), pred), FastCountIfEmptyOption[T](q.fastCount()), ) } ```  **Scope:** Every free function in the library (~60 operators). Methods that exist only as methods (OneShot, Seq, etc.) are unchanged. Constructors (From, FromSlice, Iota, etc.) still return `Query[T]`. Consumers that produce Go types (ToSlice, ToMap, etc.) should accept `iter.Seq[T]`.  **Key benefit:** linq becomes composable with the entire Go iterator ecosystem. Any `iter.Seq[T]` from any source — stdlib, third-party libraries, user code — works with linq operators directly. No wrapping. No unwrapping. The Query layer is opt-in for when you need it.'
    origin: Strategy 2026-03-14
    discovered: 2026-04-09
